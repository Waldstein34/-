<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大学課題アラート</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --ink: #1e2428;
      --muted: #647078;
      --line: #d8dedb;
      --panel: #ffffff;
      --focus: #0f7b74;
      --warn: #b36a00;
      --warn-soft: #fff1d7;
      --danger: #b3261e;
      --danger-soft: #ffe0dc;
      --done: #5b676e;
      --shadow: 0 14px 40px rgba(21, 37, 44, .11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(15, 123, 116, .09), transparent 36%),
        linear-gradient(315deg, rgba(179, 106, 0, .08), transparent 34%),
        var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.5vw, 2.1rem);
      line-height: 1.1;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .today {
      display: grid;
      place-items: center;
      min-width: 86px;
      min-height: 72px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .78);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .today b {
      display: block;
      font-size: 1.45rem;
    }

    .toolbar,
    .form,
    .summary {
      background: rgba(255, 255, 255, .88);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px;
      margin-bottom: 12px;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(72px, 1fr));
      gap: 2px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef2f0;
    }

    .segmented button,
    .icon-button,
    .primary,
    .ghost {
      min-height: 38px;
      border: 0;
      border-radius: 7px;
      cursor: pointer;
      color: var(--ink);
    }

    .segmented button {
      padding: 0 12px;
      background: transparent;
      color: var(--muted);
    }

    .segmented button.active {
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 1px 8px rgba(27, 40, 45, .12);
    }

    .icon-button,
    .ghost {
      display: inline-grid;
      place-items: center;
      width: 42px;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .primary {
      padding: 0 14px;
      background: var(--focus);
      color: #fff;
      font-weight: 700;
    }

    .ghost {
      width: auto;
      padding: 0 12px;
    }

    .toolbar-spacer {
      flex: 1 1 auto;
    }

    .form {
      display: grid;
      grid-template-columns: minmax(150px, 1.1fr) minmax(150px, .9fr) minmax(90px, .45fr) minmax(150px, .85fr) minmax(84px, .45fr) minmax(120px, .65fr) minmax(150px, .8fr) auto;
      gap: 9px;
      align-items: end;
      padding: 12px;
      margin-bottom: 12px;
    }

    .form.is-hidden {
      display: none;
    }

    .form-head {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .form-title {
      margin: 0;
      font-size: .95rem;
      font-weight: 800;
    }

    .sync-panel {
      grid-template-columns: minmax(180px, 1fr) minmax(220px, 1.2fr) minmax(150px, .8fr) auto auto auto;
    }

    .sync-status {
      grid-column: 1 / -1;
      margin: 0;
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.5;
    }

    .lecture-control,
    .alert-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
    }

    .lecture-control input,
    .alert-control input,
    .alert-control select {
      grid-column: 1 / -1;
    }

    .small-button {
      min-height: 40px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-weight: 700;
    }

    .is-hidden {
      display: none;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 10px;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(15, 123, 116, .25);
      outline-offset: 2px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .metric {
      padding: 12px;
      background: rgba(255, 255, 255, .78);
      min-width: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: .74rem;
      font-weight: 700;
    }

    .metric b {
      display: block;
      margin-top: 3px;
      font-size: 1.55rem;
      line-height: 1;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .week-board {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: start;
    }

    .day-column {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .68);
      box-shadow: 0 8px 22px rgba(21, 37, 44, .07);
      overflow: hidden;
    }

    .day-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(238, 242, 240, .78);
      font-weight: 800;
    }

    .day-stack {
      display: grid;
      gap: 8px;
      padding: 8px;
    }

    .day-empty {
      padding: 18px 8px;
      color: var(--muted);
      font-size: .82rem;
      text-align: center;
    }

    .assignment {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 10px;
      align-items: center;
      min-height: 74px;
      padding: 11px;
      border: 1px solid var(--line);
      border-left: 6px solid var(--focus);
      border-radius: 8px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 8px 22px rgba(21, 37, 44, .08);
    }

    .assignment.warn {
      border-left-color: var(--warn);
      background: var(--warn-soft);
    }

    .assignment.danger,
    .assignment.overdue {
      border-left-color: var(--danger);
      background: var(--danger-soft);
    }

    .assignment.done {
      opacity: .66;
      border-left-color: var(--done);
    }

    .lecture-card {
      grid-template-columns: auto 1fr auto;
      align-items: start;
      min-height: 0;
      padding: 10px;
      border-left-width: 5px;
      box-shadow: none;
    }

    .lecture-card .due {
      grid-column: 2 / 4;
      text-align: left;
      min-width: 0;
      margin-top: 4px;
      font-size: .95rem;
    }

    .check {
      width: 24px;
      height: 24px;
      accent-color: var(--focus);
    }

    .main {
      min-width: 0;
    }

    .title-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: baseline;
    }

    .name {
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .task-name {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: .86rem;
      overflow-wrap: anywhere;
    }

    .course {
      color: var(--muted);
      font-size: .88rem;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
      color: var(--muted);
      font-size: .83rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 8px;
      border: 1px solid rgba(0, 0, 0, .08);
      border-radius: 999px;
      background: rgba(255, 255, 255, .62);
      white-space: nowrap;
    }

    .due {
      min-width: 86px;
      text-align: right;
      font-weight: 800;
    }

    .delete {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.2rem;
    }

    .delete:hover {
      background: rgba(179, 38, 30, .1);
      color: var(--danger);
    }

    .empty {
      padding: 26px 16px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .58);
      color: var(--muted);
      text-align: center;
    }

    .notice {
      margin-top: 10px;
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      .form {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .form .primary {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 12px;
      }

      header {
        grid-template-columns: 1fr;
      }

      .today {
        justify-self: start;
        min-height: 58px;
        grid-auto-flow: column;
        gap: 8px;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .week-board {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 540px) {
      .toolbar {
        align-items: stretch;
      }

      .segmented {
        width: 100%;
      }

      .toolbar-spacer {
        display: none;
      }

      .form,
      .summary {
        grid-template-columns: 1fr;
      }

      .assignment {
        grid-template-columns: auto 1fr auto;
      }

      .due {
        grid-column: 2 / 4;
        text-align: left;
      }

      .week-board {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>大学課題アラート</h1>
        <p class="sub">月〜土の講義ごとに、今週の課題と通知を管理します。</p>
      </div>
      <div class="today" aria-label="今日">
        <span id="monthLabel"></span>
        <b id="dayLabel"></b>
      </div>
    </header>

    <section class="toolbar" aria-label="表示設定">
      <div class="segmented" role="group" aria-label="表示フィルター">
        <button type="button" class="active" data-filter="active">未完了</button>
        <button type="button" data-filter="all">すべて</button>
        <button type="button" data-filter="done">完了</button>
      </div>
      <div class="toolbar-spacer"></div>
      <button type="button" class="ghost" id="notifyButton">通知を許可</button>
      <button type="button" class="ghost" id="syncToggleButton">同期設定</button>
      <button type="button" class="icon-button" id="exportButton" title="JSONを書き出す" aria-label="JSONを書き出す">↓</button>
      <label class="icon-button" title="JSONを読み込む" aria-label="JSONを読み込む">
        ↑
        <input id="importInput" type="file" accept="application/json" hidden>
      </label>
    </section>

    <section class="form sync-panel is-hidden" id="syncPanel" aria-label="同期設定">
      <div class="form-head">
        <p class="form-title">同期設定</p>
        <button type="button" class="icon-button" id="closeSyncButton" title="閉じる" aria-label="閉じる">×</button>
      </div>
      <label>
        Supabase URL
        <input id="syncUrlInput" placeholder="https://xxxx.supabase.co">
      </label>
      <label>
        anon key
        <input id="syncKeyInput" type="password" placeholder="public anon key">
      </label>
      <label>
        同期ID
        <input id="syncIdInput" maxlength="80" placeholder="例: my-university-board">
      </label>
      <button type="button" class="small-button" id="saveSyncButton">保存</button>
      <button type="button" class="small-button" id="pullSyncButton">受信</button>
      <button type="button" class="primary" id="pushSyncButton">送信</button>
      <p class="sync-status" id="syncStatus">Supabase の `assignment_sync` テーブルを作成して、同じ同期IDを各端末に設定してください。</p>
    </section>

    <form class="form is-hidden" id="assignmentForm">
      <div class="form-head">
        <p class="form-title">講義と今週の課題を追加</p>
        <button type="button" class="icon-button" id="closeFormButton" title="閉じる" aria-label="閉じる">×</button>
      </div>
      <label>
        課題名
        <input id="titleInput" required maxlength="80" placeholder="例: 統計学レポート">
      </label>
      <label>
        講義
        <div class="lecture-control">
          <select id="lectureSelect"></select>
          <button class="small-button" id="saveLectureButton" type="button">登録</button>
          <input id="newLectureInput" class="is-hidden" maxlength="60" placeholder="講義名を入力">
        </div>
      </label>
      <label>
        曜日
        <select id="weekdayInput">
          <option value="mon">月</option>
          <option value="tue">火</option>
          <option value="wed">水</option>
          <option value="thu">木</option>
          <option value="fri">金</option>
          <option value="sat">土</option>
        </select>
      </label>
      <label>
        締切
        <input id="dueInput" type="datetime-local" required>
      </label>
      <label>
        優先度
        <select id="priorityInput">
          <option value="高">高</option>
          <option value="中" selected>中</option>
          <option value="低">低</option>
        </select>
      </label>
      <label>
        通知方法
        <select id="alertModeInput">
          <option value="specific" selected>指定日時</option>
          <option value="repeat">繰り返し</option>
          <option value="off">通知なし</option>
        </select>
      </label>
      <label id="specificAlertLabel">
        通知日時
        <input id="specificAlertInput" type="datetime-local">
      </label>
      <label id="repeatAlertLabel" class="is-hidden">
        繰り返し
        <select id="repeatInput">
          <option value="daily7">7日前から毎日</option>
          <option value="hourly48">48時間前から1時間ごと</option>
          <option value="halfHourly24">24時間前から30分ごと</option>
          <option value="off">通知なし</option>
        </select>
      </label>
      <button class="primary" type="submit">登録</button>
    </form>

    <section class="summary" aria-label="課題サマリー">
      <div class="metric"><span>今日まで</span><b id="dueTodayCount">0</b></div>
      <div class="metric"><span>3日以内</span><b id="soonCount">0</b></div>
      <div class="metric"><span>未完了講義</span><b id="activeCount">0</b></div>
      <div class="metric"><span>通知あり</span><b id="alertCount">0</b></div>
    </section>

    <section class="week-board" id="assignmentList" aria-live="polite"></section>
    <p class="notice">通知はこのページを開いている間に動きます。Notion に埋め込む場合は、GitHub Pages や Netlify などにこの HTML を置いた URL を /embed してください。</p>
  </main>

  <script>
    const STORAGE_KEY = "university-assignment-alerts-v1";
    const LECTURES_KEY = "university-assignment-lectures-v1";
    const SYNC_KEY = "university-assignment-sync-v1";
    const CHECK_INTERVAL_MS = 60 * 1000;
    const ADD_LECTURE_VALUE = "__add_lecture__";
    const WEEKDAYS = [
      { id: "mon", label: "月" },
      { id: "tue", label: "火" },
      { id: "wed", label: "水" },
      { id: "thu", label: "木" },
      { id: "fri", label: "金" },
      { id: "sat", label: "土" }
    ];
    const REPEAT_CYCLES = {
      daily7: { label: "7日前から毎日", startHours: 168, intervalMinutes: 1440 },
      hourly48: { label: "48時間前から1時間ごと", startHours: 48, intervalMinutes: 60 },
      halfHourly24: { label: "24時間前から30分ごと", startHours: 24, intervalMinutes: 30 },
      off: { label: "通知なし", startHours: 0, intervalMinutes: 0 }
    };
    const now = () => new Date();

    const state = {
      filter: "active",
      formOpen: false,
      syncOpen: false,
      assignments: loadAssignments(),
      lectures: [],
      sync: loadSyncConfig()
    };
    state.lectures = loadLectures(state.assignments);

    const elements = {
      monthLabel: document.querySelector("#monthLabel"),
      dayLabel: document.querySelector("#dayLabel"),
      syncToggle: document.querySelector("#syncToggleButton"),
      syncPanel: document.querySelector("#syncPanel"),
      closeSync: document.querySelector("#closeSyncButton"),
      syncUrl: document.querySelector("#syncUrlInput"),
      syncKey: document.querySelector("#syncKeyInput"),
      syncId: document.querySelector("#syncIdInput"),
      saveSync: document.querySelector("#saveSyncButton"),
      pullSync: document.querySelector("#pullSyncButton"),
      pushSync: document.querySelector("#pushSyncButton"),
      syncStatus: document.querySelector("#syncStatus"),
      closeForm: document.querySelector("#closeFormButton"),
      form: document.querySelector("#assignmentForm"),
      title: document.querySelector("#titleInput"),
      lecture: document.querySelector("#lectureSelect"),
      newLecture: document.querySelector("#newLectureInput"),
      saveLecture: document.querySelector("#saveLectureButton"),
      weekday: document.querySelector("#weekdayInput"),
      due: document.querySelector("#dueInput"),
      priority: document.querySelector("#priorityInput"),
      alertMode: document.querySelector("#alertModeInput"),
      specificAlert: document.querySelector("#specificAlertInput"),
      repeat: document.querySelector("#repeatInput"),
      specificAlertLabel: document.querySelector("#specificAlertLabel"),
      repeatAlertLabel: document.querySelector("#repeatAlertLabel"),
      list: document.querySelector("#assignmentList"),
      dueTodayCount: document.querySelector("#dueTodayCount"),
      soonCount: document.querySelector("#soonCount"),
      activeCount: document.querySelector("#activeCount"),
      alertCount: document.querySelector("#alertCount"),
      notify: document.querySelector("#notifyButton"),
      exportButton: document.querySelector("#exportButton"),
      importInput: document.querySelector("#importInput")
    };

    function loadAssignments() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          return JSON.parse(saved).map(normalizeAssignment);
        } catch {
          localStorage.removeItem(STORAGE_KEY);
        }
      }

      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(23, 59, 0, 0);
      const nextWeek = new Date();
      nextWeek.setDate(nextWeek.getDate() + 7);
      nextWeek.setHours(18, 0, 0, 0);

      return [
        normalizeAssignment({
          title: "英語プレゼン準備",
          lecture: "Academic English",
          weekday: "mon",
          due: toInputDate(tomorrow),
          priority: "高",
          alertMode: "specific",
          alertAt: toInputDate(new Date(tomorrow.getTime() - 24 * 36e5))
        }),
        normalizeAssignment({
          title: "ゼミ文献メモ",
          lecture: "専門演習",
          weekday: "wed",
          due: toInputDate(nextWeek),
          priority: "中",
          alertMode: "repeat",
          repeatCycle: "daily7"
        })
      ];
    }

    function loadSyncConfig() {
      const saved = localStorage.getItem(SYNC_KEY);
      if (!saved) return { url: "", key: "", id: "" };
      try {
        return { url: "", key: "", id: "", ...JSON.parse(saved) };
      } catch {
        localStorage.removeItem(SYNC_KEY);
        return { url: "", key: "", id: "" };
      }
    }

    function loadLectures(assignments) {
      const saved = localStorage.getItem(LECTURES_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed)) return uniqueLectures(parsed);
        } catch {
          localStorage.removeItem(LECTURES_KEY);
        }
      }
      return uniqueLectures([
        "Academic English",
        "専門演習",
        ...assignments.map(item => item.lecture || item.course).filter(Boolean)
      ]);
    }

    function uniqueLectures(values) {
      return [...new Set(values.map(value => String(value).trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ja"));
    }

    function normalizeAssignment(item) {
      const legacyCycle = item.cycle;
      const alertMode = item.alertMode || (legacyCycle === "off" ? "off" : legacyCycle ? "repeat" : "specific");
      const repeatCycle = REPEAT_CYCLES[item.repeatCycle] ? item.repeatCycle : (REPEAT_CYCLES[legacyCycle] ? legacyCycle : "daily7");
      const due = item.due;
      const defaultAlert = due ? toInputDate(new Date(new Date(due).getTime() - 24 * 36e5)) : "";

      return {
        id: item.id || crypto.randomUUID(),
        title: String(item.title || "無題の課題"),
        lecture: String(item.lecture || item.course || ""),
        course: String(item.lecture || item.course || ""),
        weekday: WEEKDAYS.some(day => day.id === item.weekday) ? item.weekday : "mon",
        due,
        priority: item.priority || "中",
        alertMode,
        alertAt: item.alertAt || defaultAlert,
        repeatCycle,
        done: Boolean(item.done),
        notified: Boolean(item.notified),
        lastNotifiedAt: item.lastNotifiedAt || null
      };
    }

    function saveAssignments() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.assignments));
    }

    function saveLectures() {
      localStorage.setItem(LECTURES_KEY, JSON.stringify(state.lectures));
    }

    function saveSyncConfig() {
      state.sync = {
        url: elements.syncUrl.value.trim().replace(/\/$/, ""),
        key: elements.syncKey.value.trim(),
        id: elements.syncId.value.trim()
      };
      localStorage.setItem(SYNC_KEY, JSON.stringify(state.sync));
    }

    function addLecture(name) {
      const lecture = String(name || "").trim();
      if (!lecture) return "";
      state.lectures = uniqueLectures([...state.lectures, lecture]);
      saveLectures();
      renderLectureOptions(lecture);
      return lecture;
    }

    function toInputDate(date) {
      const pad = value => String(value).padStart(2, "0");
      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate())
      ].join("-") + "T" + [pad(date.getHours()), pad(date.getMinutes())].join(":");
    }

    function formatDue(value) {
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function getStatus(item) {
      if (item.done) return "done";
      const hours = (new Date(item.due) - now()) / 36e5;
      if (hours < 0) return "overdue";
      if (hours <= 24) return "danger";
      if (hours <= 72) return "warn";
      return "ok";
    }

    function getRemainingLabel(item) {
      if (item.done) return "完了";
      const diffMs = new Date(item.due) - now();
      const absHours = Math.abs(diffMs) / 36e5;
      if (diffMs < 0) {
        if (absHours < 24) return `${Math.ceil(absHours)}時間超過`;
        return `${Math.ceil(absHours / 24)}日超過`;
      }
      if (absHours < 1) return "1時間以内";
      if (absHours < 24) return `あと${Math.ceil(absHours)}時間`;
      return `あと${Math.ceil(absHours / 24)}日`;
    }

    function getAlertMethodLabel(item) {
      if (item.alertMode === "off") return "通知なし";
      if (item.alertMode === "specific") return "指定日時";
      return "繰り返し";
    }

    function getNextAlertLabel(item) {
      if (item.done) return "通知停止";
      if (item.alertMode === "off") return "通知なし";
      if (item.alertMode === "specific") {
        if (item.notified) return "通知済み";
        return item.alertAt ? `${formatDue(item.alertAt)}に通知` : "通知日時未設定";
      }

      const cycle = REPEAT_CYCLES[item.repeatCycle] || REPEAT_CYCLES.daily7;
      if (item.repeatCycle === "off") return "通知なし";
      const due = new Date(item.due);
      const start = new Date(due.getTime() - cycle.startHours * 36e5);
      if (now() < start) return `${formatDue(start)}から`;
      if (!item.lastNotifiedAt) return "次回まもなく";
      const next = new Date(new Date(item.lastNotifiedAt).getTime() + cycle.intervalMinutes * 60000);
      return `${formatDue(next)}ごろ`;
    }

    function getAlertCount(item) {
      if (item.done || item.alertMode === "off") return false;
      if (item.alertMode === "repeat") return item.repeatCycle !== "off";
      return Boolean(item.alertAt);
    }

    function renderDate() {
      const today = now();
      elements.monthLabel.textContent = `${today.getMonth() + 1}月`;
      elements.dayLabel.textContent = today.getDate();
      if (!elements.due.value) {
        const defaultDue = new Date();
        defaultDue.setHours(23, 59, 0, 0);
        elements.due.value = toInputDate(defaultDue);
      }
      if (!elements.specificAlert.value) {
        elements.specificAlert.value = toInputDate(new Date(new Date(elements.due.value).getTime() - 24 * 36e5));
      }
    }

    function renderLectureOptions(selected = elements.lecture.value) {
      elements.lecture.innerHTML = "";
      state.lectures.forEach(lecture => {
        const option = document.createElement("option");
        option.value = lecture;
        option.textContent = lecture;
        elements.lecture.append(option);
      });
      const addOption = document.createElement("option");
      addOption.value = ADD_LECTURE_VALUE;
      addOption.textContent = "+ 講義を追加";
      elements.lecture.append(addOption);
      elements.lecture.value = state.lectures.includes(selected) ? selected : (state.lectures[0] || ADD_LECTURE_VALUE);
      updateLectureInput();
    }

    function updateLectureInput() {
      const adding = elements.lecture.value === ADD_LECTURE_VALUE;
      elements.newLecture.classList.toggle("is-hidden", !adding);
      elements.saveLecture.classList.toggle("is-hidden", !adding);
      elements.newLecture.required = adding;
      if (adding) elements.newLecture.focus();
    }

    function updateAlertFields() {
      const mode = elements.alertMode.value;
      elements.specificAlertLabel.classList.toggle("is-hidden", mode !== "specific");
      elements.repeatAlertLabel.classList.toggle("is-hidden", mode !== "repeat");
      elements.specificAlert.required = mode === "specific";
    }

    function renderSyncPanel() {
      elements.syncPanel.classList.toggle("is-hidden", !state.syncOpen);
      elements.syncUrl.value = state.sync.url || "";
      elements.syncKey.value = state.sync.key || "";
      elements.syncId.value = state.sync.id || "";
      elements.syncToggle.textContent = state.sync.id ? "同期" : "同期設定";
    }

    function renderSummary() {
      const active = state.assignments.filter(item => !item.done);
      const dueToday = active.filter(item => {
        const due = new Date(item.due);
        const end = now();
        end.setHours(23, 59, 59, 999);
        return due <= end;
      });
      const soon = active.filter(item => {
        const hours = (new Date(item.due) - now()) / 36e5;
        return hours >= 0 && hours <= 72;
      });
      elements.dueTodayCount.textContent = dueToday.length;
      elements.soonCount.textContent = soon.length;
      elements.activeCount.textContent = active.length;
      elements.alertCount.textContent = active.filter(getAlertCount).length;
    }

    function renderList() {
      const filtered = state.assignments
        .filter(item => {
          if (state.filter === "active") return !item.done;
          if (state.filter === "done") return item.done;
          return true;
        })
        .sort((a, b) => new Date(a.due) - new Date(b.due));

      elements.list.innerHTML = "";
      WEEKDAYS.forEach(day => {
        const column = document.createElement("section");
        column.className = "day-column";
        column.innerHTML = `
          <div class="day-head">
            <span>${day.label}曜日</span>
            <button type="button" class="icon-button day-add" title="${day.label}曜日に追加" aria-label="${day.label}曜日に追加">＋</button>
          </div>
          <div class="day-stack"></div>
        `;

        const dayItems = filtered.filter(item => item.weekday === day.id);
        const stack = column.querySelector(".day-stack");
        column.querySelector(".day-add").addEventListener("click", () => {
          openAssignmentForm(day.id);
        });

        if (!dayItems.length) {
          stack.innerHTML = `<div class="day-empty">講義なし</div>`;
        }

        dayItems.forEach(item => {
          const article = document.createElement("article");
          article.className = `assignment lecture-card ${getStatus(item)}`;
          article.innerHTML = `
            <input class="check" type="checkbox" ${item.done ? "checked" : ""} aria-label="完了にする">
            <div class="main">
              <div class="title-line">
                <span class="name"></span>
              </div>
              <span class="task-name"></span>
              <div class="meta">
                <span class="pill"></span>
                <span class="pill"></span>
                <span class="pill"></span>
              </div>
            </div>
            <button class="delete" type="button" aria-label="削除">×</button>
            <div class="due"></div>
          `;

          article.querySelector(".name").textContent = item.lecture || "未設定の講義";
          article.querySelector(".task-name").textContent = item.title || "今週の課題";
          const pills = article.querySelectorAll(".pill");
          pills[0].textContent = formatDue(item.due);
          pills[1].textContent = item.alertMode === "repeat" ? REPEAT_CYCLES[item.repeatCycle].label : getAlertMethodLabel(item);
          pills[2].textContent = getNextAlertLabel(item);
          article.querySelector(".due").textContent = getRemainingLabel(item);

          article.querySelector(".check").addEventListener("change", event => {
            item.done = event.target.checked;
            item.notified = false;
            item.lastNotifiedAt = null;
            saveAssignments();
            render();
          });

          article.querySelector(".delete").addEventListener("click", () => {
            state.assignments = state.assignments.filter(candidate => candidate.id !== item.id);
            saveAssignments();
            render();
          });

          stack.append(article);
        });

        elements.list.append(column);
      });
    }

    function render() {
      renderDate();
      renderLectureOptions();
      updateAlertFields();
      renderSyncPanel();
      renderSummary();
      renderList();
      elements.form.classList.toggle("is-hidden", !state.formOpen);
      document.querySelectorAll("[data-filter]").forEach(button => {
        button.classList.toggle("active", button.dataset.filter === state.filter);
      });
      elements.notify.textContent = ("Notification" in window && Notification.permission === "granted") ? "通知オン" : "通知を許可";
    }

    function shouldNotify(item) {
      if (item.done || item.alertMode === "off") return false;
      const current = now();

      if (item.alertMode === "specific") {
        if (!item.alertAt || item.notified) return false;
        return current >= new Date(item.alertAt);
      }

      const cycle = REPEAT_CYCLES[item.repeatCycle] || REPEAT_CYCLES.daily7;
      if (item.repeatCycle === "off") return false;
      const due = new Date(item.due);
      const hoursUntilDue = (due - current) / 36e5;
      if (hoursUntilDue < 0 || hoursUntilDue > cycle.startHours) return false;
      if (!item.lastNotifiedAt) return true;
      const elapsedMinutes = (current - new Date(item.lastNotifiedAt)) / 60000;
      return elapsedMinutes >= cycle.intervalMinutes;
    }

    function checkAlerts() {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      let changed = false;
      state.assignments.forEach(item => {
        if (!shouldNotify(item)) return;
        const method = item.alertMode === "repeat" ? REPEAT_CYCLES[item.repeatCycle].label : "指定日時";
        new Notification("課題の締切が近いです", {
          body: `${item.title}：${getRemainingLabel(item)} (${formatDue(item.due)}) / ${method}`
        });
        item.notified = true;
        item.lastNotifiedAt = now().toISOString();
        changed = true;
      });
      if (changed) {
        saveAssignments();
        render();
      }
    }

    function getSelectedLecture() {
      if (elements.lecture.value === ADD_LECTURE_VALUE) return addLecture(elements.newLecture.value);
      return elements.lecture.value;
    }

    function openAssignmentForm(weekday = elements.weekday.value) {
      state.formOpen = true;
      render();
      elements.weekday.value = weekday;
      elements.title.focus();
    }

    function setSyncStatus(message) {
      elements.syncStatus.textContent = message;
    }

    function getSyncConfig() {
      saveSyncConfig();
      if (!state.sync.url || !state.sync.key || !state.sync.id) {
        throw new Error("Supabase URL、anon key、同期IDを入力してください。");
      }
      return state.sync;
    }

    function getSyncHeaders(config) {
      return {
        apikey: config.key,
        authorization: `Bearer ${config.key}`,
        "content-type": "application/json"
      };
    }

    function buildSyncPayload() {
      return {
        lectures: state.lectures,
        assignments: state.assignments,
        savedAt: new Date().toISOString()
      };
    }

    function applySyncPayload(payload) {
      if (!payload || !Array.isArray(payload.assignments)) {
        throw new Error("同期データの形式が正しくありません。");
      }
      state.assignments = payload.assignments.map(normalizeAssignment).filter(item => item.due);
      state.lectures = uniqueLectures([
        ...(Array.isArray(payload.lectures) ? payload.lectures : []),
        ...state.assignments.map(item => item.lecture).filter(Boolean)
      ]);
      saveAssignments();
      saveLectures();
      render();
    }

    async function pushSync() {
      const config = getSyncConfig();
      setSyncStatus("クラウドへ送信中...");
      const response = await fetch(`${config.url}/rest/v1/assignment_sync?on_conflict=id`, {
        method: "POST",
        headers: {
          ...getSyncHeaders(config),
          prefer: "resolution=merge-duplicates,return=minimal"
        },
        body: JSON.stringify({
          id: config.id,
          data: buildSyncPayload(),
          updated_at: new Date().toISOString()
        })
      });
      if (!response.ok) throw new Error(await response.text());
      setSyncStatus(`送信しました: ${new Date().toLocaleString("ja-JP")}`);
    }

    async function pullSync() {
      const config = getSyncConfig();
      setSyncStatus("クラウドから受信中...");
      const response = await fetch(`${config.url}/rest/v1/assignment_sync?id=eq.${encodeURIComponent(config.id)}&select=data,updated_at`, {
        headers: getSyncHeaders(config)
      });
      if (!response.ok) throw new Error(await response.text());
      const rows = await response.json();
      if (!rows.length) {
        setSyncStatus("クラウド上にデータがありません。先にこの端末から送信してください。");
        return;
      }
      applySyncPayload(rows[0].data);
      setSyncStatus(`受信しました: ${new Date(rows[0].updated_at).toLocaleString("ja-JP")}`);
    }

    elements.form.addEventListener("submit", event => {
      event.preventDefault();
      const lecture = getSelectedLecture();
      if (!lecture) return;
      state.assignments.push(normalizeAssignment({
        title: elements.title.value.trim(),
        lecture,
        weekday: elements.weekday.value,
        due: elements.due.value,
        priority: elements.priority.value,
        alertMode: elements.alertMode.value,
        alertAt: elements.specificAlert.value,
        repeatCycle: elements.repeat.value,
        done: false
      }));
      saveAssignments();
      elements.form.reset();
      state.formOpen = false;
      render();
    });

    document.querySelectorAll("[data-filter]").forEach(button => {
      button.addEventListener("click", () => {
        state.filter = button.dataset.filter;
        render();
      });
    });

    elements.lecture.addEventListener("change", updateLectureInput);
    elements.lecture.addEventListener("input", updateLectureInput);
    elements.closeForm.addEventListener("click", () => {
      state.formOpen = false;
      render();
    });
    elements.syncToggle.addEventListener("click", () => {
      state.syncOpen = true;
      render();
      elements.syncUrl.focus();
    });
    elements.closeSync.addEventListener("click", () => {
      state.syncOpen = false;
      render();
    });
    elements.saveSync.addEventListener("click", () => {
      saveSyncConfig();
      render();
      setSyncStatus("同期設定を保存しました。別端末にも同じ設定を入れてください。");
    });
    elements.pushSync.addEventListener("click", async () => {
      try {
        await pushSync();
      } catch (error) {
        setSyncStatus(`送信できませんでした: ${error.message}`);
      }
    });
    elements.pullSync.addEventListener("click", async () => {
      try {
        await pullSync();
      } catch (error) {
        setSyncStatus(`受信できませんでした: ${error.message}`);
      }
    });
    elements.saveLecture.addEventListener("click", () => {
      addLecture(elements.newLecture.value);
      elements.newLecture.value = "";
    });
    elements.due.addEventListener("change", () => {
      if (elements.alertMode.value === "specific") {
        elements.specificAlert.value = toInputDate(new Date(new Date(elements.due.value).getTime() - 24 * 36e5));
      }
    });
    elements.alertMode.addEventListener("change", updateAlertFields);

    elements.notify.addEventListener("click", async () => {
      if (!("Notification" in window)) {
        alert("このブラウザは通知に対応していません。");
        return;
      }
      if (Notification.permission !== "granted") {
        await Notification.requestPermission();
      }
      render();
      checkAlerts();
    });

    elements.exportButton.addEventListener("click", () => {
      const data = {
        lectures: state.lectures,
        assignments: state.assignments
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "assignments.json";
      link.click();
      URL.revokeObjectURL(url);
    });

    elements.importInput.addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;
      const imported = JSON.parse(await file.text());
      const assignments = Array.isArray(imported) ? imported : imported.assignments;
      if (!Array.isArray(assignments)) return;
      state.assignments = assignments.map(normalizeAssignment).filter(item => item.due);
      state.lectures = uniqueLectures([
        ...(Array.isArray(imported.lectures) ? imported.lectures : []),
        ...state.lectures,
        ...state.assignments.map(item => item.lecture).filter(Boolean)
      ]);
      saveAssignments();
      saveLectures();
      render();
      event.target.value = "";
    });

    render();
    checkAlerts();
    setInterval(() => {
      render();
      checkAlerts();
    }, CHECK_INTERVAL_MS);
  </script>
</body>
</html>
