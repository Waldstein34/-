<!doctype html>
<html lang="ja" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>大学課題アラート</title>
<style>
  /* ===== テーマ変数 ===== */
  :root, [data-theme="light"] {
    --bg: #f7f7f4;
    --bg-grad-a: rgba(15,123,116,.09);
    --bg-grad-b: rgba(179,106,0,.08);
    --panel: #ffffff;
    --panel-2: rgba(255,255,255,.88);
    --panel-3: #f3f5f4;
    --ink: #1e2428;
    --muted: #647078;
    --line: #d8dedb;
    --focus: #0f7b74;
    --danger: #b3261e;
    --danger-soft: #fff0ee;
    --danger-border: #f5c6c2;
    --danger-label: #b3261e;
    --warn: #b36a00;
    --success: #1a6e3c;
    --info: #185fa5;
    --info-soft: #eef4fc;
    --shadow: 0 1px 3px rgba(21,37,44,.08), 0 4px 12px rgba(21,37,44,.06);
    --popup-overlay: rgba(21,37,44,.18);
    --lec-btn-color: #0f7b74;
    --carryover-bg: #fff0ee;
    --task-card-bg: #f7f8f7;
    --theme-toggle-icon: "🌙";
  }

  [data-theme="dark"] {
    --bg: #1a1d23;
    --bg-grad-a: rgba(15,123,116,.12);
    --bg-grad-b: rgba(179,106,0,.10);
    --panel: #23272f;
    --panel-2: rgba(35,39,47,.95);
    --panel-3: #2a2f38;
    --ink: #e8eaf0;
    --muted: #8a9099;
    --line: #353a44;
    --focus: #1a9e94;
    --danger: #e05a52;
    --danger-soft: #2e1a1a;
    --danger-border: #5a2a2a;
    --danger-label: #f08078;
    --warn: #d4820a;
    --success: #3ab870;
    --info: #4a9ee0;
    --info-soft: #1a2a3e;
    --shadow: 0 1px 3px rgba(0,0,0,.25), 0 4px 12px rgba(0,0,0,.20);
    --popup-overlay: rgba(0,0,0,.45);
    --lec-btn-color: #1a9e94;
    --carryover-bg: #2e1a1a;
    --task-card-bg: #2a2f38;
    --theme-toggle-icon: "☀️";
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      linear-gradient(135deg, var(--bg-grad-a), transparent 36%),
      linear-gradient(315deg, var(--bg-grad-b), transparent 34%),
      var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 18px;
    transition: background .2s, color .2s;
  }

  .app { max-width: 980px; margin: 0 auto; }

  /* ===== ヘッダー ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  header h1 {
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 3px;
  }

  .sem { font-size: .78rem; color: var(--muted); }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .date-badge {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 12px;
    text-align: center;
    background: var(--panel-2);
    box-shadow: var(--shadow);
    min-width: 58px;
  }

  .date-badge .mo { font-size: .68rem; color: var(--muted); }
  .date-badge .dy { font-size: 1.3rem; font-weight: 700; line-height: 1.1; color: var(--ink); }

  /* ===== ボタン共通 ===== */
  button { font: inherit; cursor: pointer; }

  .btn {
    min-height: 32px;
    padding: 0 12px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: var(--panel);
    color: var(--ink);
    font-size: .78rem;
    transition: background .15s;
  }

  .btn:hover { background: var(--panel-3); }

  .btn-primary {
    background: var(--focus);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 0 14px;
    min-height: 32px;
    font-size: .78rem;
    font-weight: 700;
    cursor: pointer;
  }

  .btn-primary:hover { opacity: .9; }

  /* テーマ切り替えボタン */
  .theme-toggle {
    min-height: 32px;
    padding: 0 10px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: var(--panel);
    color: var(--ink);
    font-size: .82rem;
    cursor: pointer;
  }

  /* ===== サマリー ===== */
  .summary {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .metric {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 11px;
    box-shadow: var(--shadow);
  }

  .metric span { display: block; font-size: .68rem; color: var(--muted); font-weight: 700; margin-bottom: 2px; }
  .metric b { font-size: 1.3rem; font-weight: 700; line-height: 1; color: var(--ink); }
  .metric b.d { color: var(--danger); }
  .metric b.s { color: var(--success); }

  /* ===== メインカラム ===== */
  .columns {
    display: grid;
    grid-template-columns: minmax(0,1fr) minmax(0,1.6fr);
    gap: 12px;
    align-items: start;
  }

  /* ===== カード ===== */
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
  }

  .card-header p { font-size: .85rem; font-weight: 700; color: var(--ink); }

  /* ===== テーブル ===== */
  table { width: 100%; border-collapse: collapse; font-size: .78rem; table-layout: fixed; }
  thead tr { background: var(--panel-3); }
  th { text-align: left; padding: 6px 8px; font-size: .68rem; font-weight: 700; color: var(--muted); border-bottom: 1px solid var(--line); }
  td { padding: 7px 8px; border-bottom: 1px solid var(--line); color: var(--ink); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }

  .day-b {
    display: inline-block;
    background: var(--info-soft);
    color: var(--info);
    font-size: .68rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
  }

  .lec-btn {
    background: none;
    border: none;
    font: inherit;
    font-size: .78rem;
    color: var(--lec-btn-color);
    cursor: pointer;
    text-decoration: underline;
    text-align: left;
    padding: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    display: block;
  }

  .lec-btn:hover { opacity: .75; }

  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: .8rem;
    padding: 2px 4px;
  }

  .icon-btn:hover { color: var(--danger); }

  /* ===== 右カラム：スタック ===== */
  .stack-section { padding: 10px 12px; }
  .stack-section + .stack-section { border-top: 1px solid var(--line); }
  .stack-section.carryover { background: var(--carryover-bg); }

  .sec-label {
    font-size: .68rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .sec-label.danger { color: var(--danger-label); }

  .task-cards { display: grid; gap: 6px; }

  .task-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--task-card-bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
  }

  .task-card.co { border-color: var(--danger-border); background: var(--panel); }
  .task-card.done { opacity: .5; }

  .task-info .ln { font-size: .82rem; font-weight: 700; color: var(--ink); }
  .task-info .lm { font-size: .72rem; color: var(--muted); margin-top: 1px; }
  .task-info .ln.done-text { text-decoration: line-through; }

  input[type=checkbox] {
    width: 17px;
    height: 17px;
    accent-color: var(--focus);
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ===== ポップアップ ===== */
  .popup-overlay {
    position: fixed;
    inset: 0;
    background: var(--popup-overlay);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .popup {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    width: 300px;
    box-shadow: var(--shadow);
  }

  .popup.wide { width: min(520px, calc(100vw - 32px)); }

  .popup-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .popup-head p { font-size: .88rem; font-weight: 700; color: var(--ink); }

  .popup-close {
    background: none;
    border: none;
    font-size: 1rem;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 6px;
  }

  .field { margin-bottom: 10px; }

  .field label {
    display: block;
    font-size: .68rem;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .field input, .field textarea, .field select {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 6px 9px;
    font: inherit;
    font-size: .78rem;
    color: var(--ink);
    background: var(--panel-3);
    resize: none;
  }

  .field textarea { height: 56px; }

  .url-row { display: flex; gap: 6px; align-items: center; }
  .url-row input { flex: 1; }

  .url-link {
    font-size: .72rem;
    color: var(--info);
    text-decoration: none;
    white-space: nowrap;
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 4px 8px;
    background: var(--panel);
  }

  .url-link:hover { background: var(--panel-3); }

  .popup-footer {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-top: 14px;
  }

  .empty {
    color: var(--muted);
    font-size: .72rem;
    padding: 8px 0;
  }

  .toolbar {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-bottom: 10px;
  }

  .sync-status {
    color: var(--muted);
    font-size: .72rem;
    line-height: 1.45;
  }

  @media (max-width: 760px) {
    body { padding: 12px; }
    header { align-items: flex-start; gap: 10px; }
    .header-right { flex-wrap: wrap; justify-content: flex-end; }
    .summary { grid-template-columns: repeat(2,1fr); }
    .columns { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>大学課題アラート</h1>
      <p class="sem" id="semesterLabel"></p>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeBtn">🌙 ダーク</button>
      <button class="btn" id="semesterBtn">学期設定</button>
      <button class="btn" id="syncToggleButton">同期設定</button>
      <div class="date-badge">
        <p class="mo" id="monthLabel"></p>
        <p class="dy" id="dayLabel"></p>
      </div>
    </div>
  </header>

  <div class="summary">
    <div class="metric"><span>今週</span><b id="weekMetric">第1回</b></div>
    <div class="metric"><span>今週の課題</span><b id="thisWeekMetric">0</b></div>
    <div class="metric"><span>繰り越し</span><b class="d" id="carryMetric">0</b></div>
    <div class="metric"><span>完了済み</span><b class="s" id="doneMetric">0</b></div>
  </div>

  <div class="toolbar">
    <button class="btn" id="exportButton">JSON書き出し</button>
    <label class="btn">
      JSON読込
      <input id="importInput" type="file" accept="application/json" hidden>
    </label>
  </div>

  <div class="columns">
    <div class="card">
      <div class="card-header">
        <p>毎週の課題マスタ</p>
        <button class="btn" id="addMasterBtn">+ 追加</button>
      </div>
      <table>
        <colgroup>
          <col style="width:20%">
          <col style="width:70%">
          <col style="width:10%">
        </colgroup>
        <thead>
          <tr>
            <th>曜日</th>
            <th>講義名</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="masterBody"></tbody>
      </table>
    </div>

    <div class="card" id="stackCard"></div>
  </div>
</div>

<div id="masterPopup" class="popup-overlay" style="display:none;">
  <div class="popup">
    <div class="popup-head">
      <p id="masterPopupTitle">講義</p>
      <button class="popup-close" id="closeMasterPopup">✕</button>
    </div>
    <div class="field" id="masterWeekdayField">
      <label>曜日</label>
      <select id="masterWeekdayInput">
        <option value="mon">月</option>
        <option value="tue">火</option>
        <option value="wed">水</option>
        <option value="thu">木</option>
        <option value="fri">金</option>
        <option value="sat">土</option>
      </select>
    </div>
    <div class="field" id="masterLectureField">
      <label>講義名</label>
      <input id="masterLectureInput" type="text" placeholder="講義名">
    </div>
    <div class="field">
      <label>課題名</label>
      <input id="masterTaskInput" type="text" placeholder="毎週の課題名">
    </div>
    <div class="field">
      <label>メモ</label>
      <textarea id="masterMemoInput" placeholder="メモを入力..."></textarea>
    </div>
    <div class="field">
      <label>備考</label>
      <textarea id="masterNoteInput" placeholder="備考を入力..."></textarea>
    </div>
    <div class="field">
      <label>参照URL</label>
      <div class="url-row">
        <input id="masterUrlInput" type="url" placeholder="https://...">
        <a id="masterUrlOpen" href="#" target="_blank" rel="noopener" class="url-link">開く</a>
      </div>
    </div>
    <div class="popup-footer">
      <button class="btn" id="cancelMasterBtn">キャンセル</button>
      <button class="btn-primary" id="saveMasterBtn">保存</button>
    </div>
  </div>
</div>

<div id="syncPanel" class="popup-overlay" style="display:none;">
  <div class="popup wide">
    <div class="popup-head">
      <p>同期設定</p>
      <button class="popup-close" id="closeSyncButton">✕</button>
    </div>
    <div class="field">
      <label>Supabase URL</label>
      <input id="syncUrlInput" placeholder="https://xxxx.supabase.co">
    </div>
    <div class="field">
      <label>publishable key</label>
      <input id="syncKeyInput" type="password" placeholder="publishable key">
    </div>
    <div class="field">
      <label>同期ID</label>
      <input id="syncIdInput" maxlength="80" placeholder="例: my-university-board">
    </div>
    <p class="sync-status" id="syncStatus">Supabase の assignment_sync テーブルを作成して、同じ同期IDを各端末に設定してください。</p>
    <div class="popup-footer">
      <button class="btn" id="saveSyncButton">保存</button>
      <button class="btn" id="pullSyncButton">受信</button>
      <button class="btn-primary" id="pushSyncButton">送信</button>
    </div>
  </div>
</div>

<script>
  const MASTER_KEY = "university-assignment-master-v2";
  const COMPLETION_KEY = "university-assignment-completions-v2";
  const SETTINGS_KEY = "university-assignment-settings-v2";
  const SYNC_KEY = "university-assignment-sync-v1";
  const CHECK_INTERVAL_MS = 30000;
  const AUTO_SYNC_DELAY_MS = 1200;
  const AUTO_PULL_INTERVAL_MS = 30000;
  const WEEKDAYS = [
    { id: "mon", label: "月", long: "月曜" },
    { id: "tue", label: "火", long: "火曜" },
    { id: "wed", label: "水", long: "水曜" },
    { id: "thu", label: "木", long: "木曜" },
    { id: "fri", label: "金", long: "金曜" },
    { id: "sat", label: "土", long: "土曜" }
  ];

  const state = {
    masters: loadMasters(),
    completions: loadCompletions(),
    settings: loadSettings(),
    sync: loadSyncConfig(),
    editingMasterId: null,
    syncApplying: false,
    autoSyncTimer: null
  };

  const els = {
    semesterLabel: document.querySelector("#semesterLabel"),
    monthLabel: document.querySelector("#monthLabel"),
    dayLabel: document.querySelector("#dayLabel"),
    themeBtn: document.querySelector("#themeBtn"),
    semesterBtn: document.querySelector("#semesterBtn"),
    syncToggle: document.querySelector("#syncToggleButton"),
    masterBody: document.querySelector("#masterBody"),
    stackCard: document.querySelector("#stackCard"),
    weekMetric: document.querySelector("#weekMetric"),
    thisWeekMetric: document.querySelector("#thisWeekMetric"),
    carryMetric: document.querySelector("#carryMetric"),
    doneMetric: document.querySelector("#doneMetric"),
    addMaster: document.querySelector("#addMasterBtn"),
    masterPopup: document.querySelector("#masterPopup"),
    masterPopupTitle: document.querySelector("#masterPopupTitle"),
    closeMasterPopup: document.querySelector("#closeMasterPopup"),
    cancelMaster: document.querySelector("#cancelMasterBtn"),
    saveMaster: document.querySelector("#saveMasterBtn"),
    masterWeekdayField: document.querySelector("#masterWeekdayField"),
    masterLectureField: document.querySelector("#masterLectureField"),
    masterWeekday: document.querySelector("#masterWeekdayInput"),
    masterLecture: document.querySelector("#masterLectureInput"),
    masterTask: document.querySelector("#masterTaskInput"),
    masterMemo: document.querySelector("#masterMemoInput"),
    masterNote: document.querySelector("#masterNoteInput"),
    masterUrl: document.querySelector("#masterUrlInput"),
    masterUrlOpen: document.querySelector("#masterUrlOpen"),
    syncPanel: document.querySelector("#syncPanel"),
    closeSync: document.querySelector("#closeSyncButton"),
    syncUrl: document.querySelector("#syncUrlInput"),
    syncKey: document.querySelector("#syncKeyInput"),
    syncId: document.querySelector("#syncIdInput"),
    syncStatus: document.querySelector("#syncStatus"),
    saveSync: document.querySelector("#saveSyncButton"),
    pullSync: document.querySelector("#pullSyncButton"),
    pushSync: document.querySelector("#pushSyncButton"),
    exportButton: document.querySelector("#exportButton"),
    importInput: document.querySelector("#importInput")
  };

  function makeId() {
    return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
  }

  function today() {
    const date = new Date();
    date.setHours(0, 0, 0, 0);
    return date;
  }

  function defaultSemesterStart() {
    const date = new Date();
    return `${date.getFullYear()}-04-07`;
  }

  function loadSettings() {
    const fallback = { semesterStart: defaultSemesterStart(), theme: "light" };
    try {
      return { ...fallback, ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}") };
    } catch {
      return fallback;
    }
  }

  function loadMasters() {
    const saved = localStorage.getItem(MASTER_KEY);
    if (saved) {
      try {
        return JSON.parse(saved).map(normalizeMaster);
      } catch {
        localStorage.removeItem(MASTER_KEY);
      }
    }
    return [
      normalizeMaster({ weekday: "mon", lecture: "Academic English", taskName: "英語プレゼン準備", memo: "スライド5枚以上、英語で発表", note: "", url: "https://classroom.google.com/" }),
      normalizeMaster({ weekday: "wed", lecture: "日本史概論", taskName: "リアクションペーパー", memo: "", note: "", url: "" }),
      normalizeMaster({ weekday: "thu", lecture: "統計学入門", taskName: "演習問題", memo: "", note: "", url: "" }),
      normalizeMaster({ weekday: "fri", lecture: "社会学概論", taskName: "ゼミ文献メモ", memo: "", note: "", url: "" })
    ];
  }

  function loadCompletions() {
    try {
      return JSON.parse(localStorage.getItem(COMPLETION_KEY) || "{}");
    } catch {
      return {};
    }
  }

  function loadSyncConfig() {
    try {
      return { url: "", key: "", id: "", ...JSON.parse(localStorage.getItem(SYNC_KEY) || "{}") };
    } catch {
      return { url: "", key: "", id: "" };
    }
  }

  function normalizeMaster(item) {
    return {
      id: item.id || makeId(),
      weekday: WEEKDAYS.some(day => day.id === item.weekday) ? item.weekday : "mon",
      lecture: String(item.lecture || "新しい講義"),
      taskName: String(item.taskName || item.title || "今週の課題"),
      memo: String(item.memo || ""),
      note: String(item.note || ""),
      url: String(item.url || item.referenceUrl || "")
    };
  }

  function saveMasters() {
    localStorage.setItem(MASTER_KEY, JSON.stringify(state.masters));
    scheduleAutoPush();
  }

  function saveCompletions() {
    localStorage.setItem(COMPLETION_KEY, JSON.stringify(state.completions));
    scheduleAutoPush();
  }

  function saveSettings() {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
    scheduleAutoPush();
  }

  function saveSyncConfig() {
    state.sync = {
      url: els.syncUrl.value.trim().replace(/\/$/, ""),
      key: els.syncKey.value.trim(),
      id: els.syncId.value.trim()
    };
    localStorage.setItem(SYNC_KEY, JSON.stringify(state.sync));
  }

  function getWeekNumber(offset = 0) {
    const start = new Date(`${state.settings.semesterStart}T00:00:00`);
    const diff = today() - start;
    return Math.max(1, Math.floor(diff / (7 * 24 * 60 * 60 * 1000)) + 1 + offset);
  }

  function completionKey(masterId, week) {
    return `${masterId}:${week}`;
  }

  function isDone(masterId, week) {
    return Boolean(state.completions[completionKey(masterId, week)]);
  }

  function setDone(masterId, week, done) {
    const key = completionKey(masterId, week);
    if (done) state.completions[key] = true;
    else delete state.completions[key];
    saveCompletions();
    render();
  }

  function dayLabel(id, long = false) {
    const day = WEEKDAYS.find(candidate => candidate.id === id);
    return day ? (long ? day.long : day.label) : "月";
  }

  function formatDateLabel(dateText) {
    const date = new Date(`${dateText}T00:00:00`);
    return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
  }

  function setTheme(theme) {
    const safeTheme = theme === "dark" ? "dark" : "light";
    document.documentElement.dataset.theme = safeTheme;
    state.settings.theme = safeTheme;
    els.themeBtn.textContent = safeTheme === "dark" ? "☀️ ライト" : "🌙 ダーク";
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
  }

  function renderHeader() {
    const date = new Date();
    const week = getWeekNumber();
    els.monthLabel.textContent = `${date.getMonth() + 1}月`;
    els.dayLabel.textContent = date.getDate();
    els.semesterLabel.textContent = `学期開始日：${formatDateLabel(state.settings.semesterStart)}　／　現在：第${week}週`;
    els.weekMetric.textContent = `第${week}回`;
  }

  function renderMasterTable() {
    els.masterBody.innerHTML = "";
    const sorted = [...state.masters].sort((a, b) => WEEKDAYS.findIndex(day => day.id === a.weekday) - WEEKDAYS.findIndex(day => day.id === b.weekday));
    sorted.forEach(master => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td><span class="day-b"></span></td>
        <td><button class="lec-btn" type="button"></button></td>
        <td><button class="icon-btn" type="button">✕</button></td>
      `;
      row.querySelector(".day-b").textContent = dayLabel(master.weekday);
      row.querySelector(".lec-btn").textContent = master.lecture;
      row.querySelector(".lec-btn").addEventListener("click", () => openMasterPopup(master.id));
      row.querySelector(".icon-btn").addEventListener("click", () => {
        state.masters = state.masters.filter(item => item.id !== master.id);
        Object.keys(state.completions).forEach(key => {
          if (key.startsWith(`${master.id}:`)) delete state.completions[key];
        });
        saveMasters();
        saveCompletions();
        render();
      });
      els.masterBody.append(row);
    });
  }

  function renderTaskCard(master, week, carryover = false) {
    const done = isDone(master.id, week);
    const card = document.createElement("div");
    card.className = `task-card ${carryover ? "co" : ""} ${done ? "done" : ""}`;
    card.innerHTML = `
      <div class="task-info">
        <p class="ln"></p>
        <p class="lm"></p>
      </div>
      <input type="checkbox">
    `;
    card.querySelector(".ln").textContent = master.lecture;
    card.querySelector(".ln").classList.toggle("done-text", done);
    card.querySelector(".lm").textContent = `${dayLabel(master.weekday, true)}　${master.taskName}`;
    card.querySelector("input").checked = done;
    card.querySelector("input").addEventListener("change", event => setDone(master.id, week, event.target.checked));
    return card;
  }

  function renderStack() {
    const week = getWeekNumber();
    const previousWeek = Math.max(1, week - 1);
    const carryovers = week > 1 ? state.masters.filter(master => !isDone(master.id, previousWeek)) : [];
    const doneThisWeek = state.masters.filter(master => isDone(master.id, week)).length;

    els.thisWeekMetric.textContent = state.masters.length;
    els.carryMetric.textContent = carryovers.length;
    els.doneMetric.textContent = doneThisWeek;
    els.stackCard.innerHTML = "";

    if (carryovers.length) {
      const section = document.createElement("div");
      section.className = "stack-section carryover";
      section.innerHTML = `<p class="sec-label danger">繰り越し（第${previousWeek}回・未完了）</p><div class="task-cards"></div>`;
      carryovers.forEach(master => section.querySelector(".task-cards").append(renderTaskCard(master, previousWeek, true)));
      els.stackCard.append(section);
    }

    const section = document.createElement("div");
    section.className = "stack-section";
    section.innerHTML = `<p class="sec-label">第${week}回　今週</p><div class="task-cards"></div>`;
    const cards = section.querySelector(".task-cards");
    if (!state.masters.length) {
      cards.innerHTML = `<p class="empty">毎週の課題マスタを追加してください。</p>`;
    } else {
      state.masters.forEach(master => cards.append(renderTaskCard(master, week)));
    }
    els.stackCard.append(section);
  }

  function render() {
    renderHeader();
    renderMasterTable();
    renderStack();
    els.syncToggle.textContent = state.sync.id ? "同期" : "同期設定";
  }

  function openMasterPopup(id = null) {
    const master = id ? state.masters.find(item => item.id === id) : normalizeMaster({});
    state.editingMasterId = id;
    els.masterPopupTitle.textContent = id ? master.lecture : "新しい講義";
    els.masterWeekdayField.style.display = id ? "none" : "block";
    els.masterLectureField.style.display = id ? "none" : "block";
    els.masterWeekday.value = master.weekday;
    els.masterLecture.value = master.lecture;
    els.masterTask.value = master.taskName;
    els.masterMemo.value = master.memo;
    els.masterNote.value = master.note;
    els.masterUrl.value = master.url;
    updateUrlOpen();
    els.masterPopup.style.display = "flex";
  }

  function closeMasterPopup() {
    els.masterPopup.style.display = "none";
    state.editingMasterId = null;
  }

  function updateUrlOpen() {
    const url = els.masterUrl.value.trim();
    els.masterUrlOpen.href = url || "#";
    els.masterUrlOpen.style.pointerEvents = url ? "auto" : "none";
    els.masterUrlOpen.style.opacity = url ? "1" : ".45";
  }

  function saveMasterFromPopup() {
    const current = state.editingMasterId ? state.masters.find(item => item.id === state.editingMasterId) : null;
    const next = normalizeMaster({
      id: state.editingMasterId,
      weekday: current ? current.weekday : els.masterWeekday.value,
      lecture: current ? current.lecture : (els.masterLecture.value.trim() || "新しい講義"),
      taskName: els.masterTask.value.trim() || "今週の課題",
      memo: els.masterMemo.value,
      note: els.masterNote.value,
      url: els.masterUrl.value.trim()
    });
    if (state.editingMasterId) {
      state.masters = state.masters.map(item => item.id === state.editingMasterId ? next : item);
    } else {
      state.masters.push(next);
    }
    saveMasters();
    closeMasterPopup();
    render();
  }

  function openSyncPanel() {
    els.syncUrl.value = state.sync.url || "";
    els.syncKey.value = state.sync.key || "";
    els.syncId.value = state.sync.id || "";
    els.syncPanel.style.display = "flex";
  }

  function closeSyncPanel() {
    els.syncPanel.style.display = "none";
  }

  function setSyncStatus(message) {
    els.syncStatus.textContent = message;
  }

  function hasSyncConfig() {
    return Boolean(state.sync.url && state.sync.key && state.sync.id);
  }

  function getSyncConfig() {
    saveSyncConfig();
    if (!hasSyncConfig()) throw new Error("Supabase URL、publishable key、同期IDを入力してください。");
    return state.sync;
  }

  function getSyncHeaders(config) {
    return {
      apikey: config.key,
      authorization: `Bearer ${config.key}`,
      "content-type": "application/json"
    };
  }

  function buildSyncPayload() {
    return {
      masters: state.masters,
      completions: state.completions,
      settings: state.settings,
      savedAt: new Date().toISOString()
    };
  }

  function applySyncPayload(payload) {
    if (!payload || !Array.isArray(payload.masters)) throw new Error("同期データの形式が正しくありません。");
    state.syncApplying = true;
    state.masters = payload.masters.map(normalizeMaster);
    state.completions = payload.completions && typeof payload.completions === "object" ? payload.completions : {};
    state.settings = { ...state.settings, ...(payload.settings || {}) };
    localStorage.setItem(MASTER_KEY, JSON.stringify(state.masters));
    localStorage.setItem(COMPLETION_KEY, JSON.stringify(state.completions));
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
    state.syncApplying = false;
    setTheme(state.settings.theme);
    render();
  }

  function scheduleAutoPush() {
    if (state.syncApplying || !hasSyncConfig()) return;
    window.clearTimeout(state.autoSyncTimer);
    state.autoSyncTimer = window.setTimeout(async () => {
      try {
        await pushSync(true);
      } catch (error) {
        if (els.syncPanel.style.display !== "none") setSyncStatus(`自動送信できませんでした: ${error.message}`);
      }
    }, AUTO_SYNC_DELAY_MS);
  }

  async function pushSync(isAuto = false) {
    const config = getSyncConfig();
    if (!isAuto) setSyncStatus("クラウドへ送信中...");
    const response = await fetch(`${config.url}/rest/v1/assignment_sync?on_conflict=id`, {
      method: "POST",
      headers: { ...getSyncHeaders(config), prefer: "resolution=merge-duplicates,return=minimal" },
      body: JSON.stringify({ id: config.id, data: buildSyncPayload(), updated_at: new Date().toISOString() })
    });
    if (!response.ok) throw new Error(await response.text());
    if (els.syncPanel.style.display !== "none") setSyncStatus(`${isAuto ? "自動送信" : "送信"}しました: ${new Date().toLocaleString("ja-JP")}`);
  }

  async function pullSync(isAuto = false) {
    if (!hasSyncConfig()) return;
    const config = getSyncConfig();
    if (!isAuto) setSyncStatus("クラウドから受信中...");
    const response = await fetch(`${config.url}/rest/v1/assignment_sync?id=eq.${encodeURIComponent(config.id)}&select=data,updated_at`, {
      headers: getSyncHeaders(config)
    });
    if (!response.ok) throw new Error(await response.text());
    const rows = await response.json();
    if (!rows.length) {
      if (!isAuto) setSyncStatus("クラウド上にデータがありません。先にこの端末から送信してください。");
      return;
    }
    applySyncPayload(rows[0].data);
    if (els.syncPanel.style.display !== "none") setSyncStatus(`${isAuto ? "自動受信" : "受信"}しました: ${new Date(rows[0].updated_at).toLocaleString("ja-JP")}`);
  }

  els.themeBtn.addEventListener("click", () => {
    setTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
    saveSettings();
  });

  els.semesterBtn.addEventListener("click", () => {
    const value = prompt("学期開始日を YYYY-MM-DD で入力してください。", state.settings.semesterStart);
    if (!value) return;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return;
    state.settings.semesterStart = value;
    saveSettings();
    render();
  });

  els.addMaster.addEventListener("click", () => openMasterPopup());
  els.closeMasterPopup.addEventListener("click", closeMasterPopup);
  els.cancelMaster.addEventListener("click", closeMasterPopup);
  els.saveMaster.addEventListener("click", saveMasterFromPopup);
  els.masterUrl.addEventListener("input", updateUrlOpen);
  els.masterPopup.addEventListener("click", event => {
    if (event.target === els.masterPopup) closeMasterPopup();
  });

  els.syncToggle.addEventListener("click", openSyncPanel);
  els.closeSync.addEventListener("click", closeSyncPanel);
  els.syncPanel.addEventListener("click", event => {
    if (event.target === els.syncPanel) closeSyncPanel();
  });
  els.saveSync.addEventListener("click", () => {
    saveSyncConfig();
    setSyncStatus("同期設定を保存しました。変更時は自動送信、30秒ごとに自動受信します。");
    scheduleAutoPush();
    render();
  });
  els.pushSync.addEventListener("click", async () => {
    try { await pushSync(); } catch (error) { setSyncStatus(`送信できませんでした: ${error.message}`); }
  });
  els.pullSync.addEventListener("click", async () => {
    try { await pullSync(); } catch (error) { setSyncStatus(`受信できませんでした: ${error.message}`); }
  });

  els.exportButton.addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(buildSyncPayload(), null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "assignments.json";
    link.click();
    URL.revokeObjectURL(url);
  });

  els.importInput.addEventListener("change", async event => {
    const file = event.target.files[0];
    if (!file) return;
    applySyncPayload(JSON.parse(await file.text()));
    event.target.value = "";
  });

  setTheme(state.settings.theme);
  render();
  setInterval(render, CHECK_INTERVAL_MS);
  setInterval(() => {
    pullSync(true).catch(error => {
      if (els.syncPanel.style.display !== "none") setSyncStatus(`自動受信できませんでした: ${error.message}`);
    });
  }, AUTO_PULL_INTERVAL_MS);
</script>
</body>
</html>
